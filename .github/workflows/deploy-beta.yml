name: Deploy beta preview

# Any branch except main (and gh-pages-content itself — this workflow's own
# push to that branch would otherwise re-trigger it in a loop).
on:
  push:
    branches-ignore: [main, gh-pages-content]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Same group as deploy.yml / cleanup-beta.yml — see the comment there.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Type-check
        run: npx tsc -b

      # DEPLOY_BASE is read directly by vite.config.ts, not just passed as a
      # `vite build --base` CLI flag — the CLI flag alone would correctly
      # rewrite index.html's asset paths but NOT the PWA manifest's
      # start_url/scope, which vite.config.ts computes from this env var at
      # config-evaluation time.
      - name: Build (beta base path)
        env:
          DEPLOY_BASE: /expense-toolkit/beta/
        run: npx vite build

      - name: Checkout pages-content branch
        id: checkout_content
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages-content
          path: pages-content
          fetch-depth: 1

      - name: Initialize pages-content branch if missing
        if: steps.checkout_content.outcome == 'failure'
        run: |
          mkdir -p pages-content
          cd pages-content
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages-content
          git commit -q --allow-empty -m "Initialize pages-content branch"

      # Replace only beta/ in the shared tree; main's root content (deployed
      # by deploy.yml) is left untouched. This app has no dist-root file or
      # folder literally named "beta", so this convention doesn't collide
      # with anything main itself publishes.
      - name: Merge beta build into shared site tree
        run: |
          rm -rf pages-content/beta
          mkdir -p pages-content/beta
          rsync -a dist/ pages-content/beta/
          echo "${{ github.ref_name }}" > pages-content/beta/.deployed-branch

      - name: Commit and push pages-content
        working-directory: pages-content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" 2>/dev/null || \
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -m "Deploy beta (${{ github.ref_name }}) @ ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:gh-pages-content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-content

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
