name: Deploy to GitHub Pages

on:
  # Deploy whenever the default branch updates.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages and to push the
# merged site tree to the gh-pages-content branch (see below).
permissions:
  contents: write
  pages: write
  id-token: write

# Shared across deploy.yml / deploy-beta.yml / cleanup-beta.yml so they never
# run concurrently and race on the gh-pages-content branch or the Pages
# deployment itself.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        # enablement: true asks GitHub to turn on Pages (Actions source) for the
        # repo automatically, so the first deploy doesn't 404 when Pages was
        # never enabled by hand. If org/repo policy forbids it, enable Pages
        # manually under Settings → Pages → Source: GitHub Actions.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        run: npm run build

      # gh-pages-content is a plain git branch we use ONLY as a staging area
      # for the full published site tree (root = main, beta/ = the latest
      # branch-preview build from deploy-beta.yml). It is NOT the Pages
      # source itself — Pages source stays "GitHub Actions" — this just lets
      # a main deploy and a beta deploy coexist on the same live site without
      # one wiping the other's output, since actions/deploy-pages always
      # publishes a full artifact with no notion of "add this subfolder only".
      - name: Checkout pages-content branch
        id: checkout_content
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages-content
          path: pages-content
          fetch-depth: 1

      - name: Initialize pages-content branch if missing
        if: steps.checkout_content.outcome == 'failure'
        run: |
          mkdir -p pages-content
          cd pages-content
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages-content
          git commit -q --allow-empty -m "Initialize pages-content branch"

      # Sync main's fresh build into the root of the shared tree, leaving
      # beta/ (a branch-preview deploy may have published there) untouched.
      - name: Merge main build into shared site tree
        run: |
          rsync -a --delete --exclude='/beta/' --exclude='/.git/' dist/ pages-content/

      - name: Commit and push pages-content
        working-directory: pages-content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" 2>/dev/null || \
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -m "Deploy main @ ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:gh-pages-content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-content

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
